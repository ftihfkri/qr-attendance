; Avatar/photo uploads. The stock php:8.2-fpm image defaults to
; upload_max_filesize=2M / post_max_size=8M, which silently rejects
; typical phone photos before Laravel validation runs. Keep these
; comfortably above the app's 8 MB limit and below nginx's 50M.
upload_max_filesize = 12M
post_max_size = 16M
memory_limit = 256M
max_file_uploads = 20
