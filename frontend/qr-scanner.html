<!DOCTYPE html>
<html>
<head>
    <title>Admin — QR & Attendance List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Attendance — QR & List</h1>
            <div class="flex gap-2">
                <a href="admin-dashboard.html" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300">Dashboard</a>
                <a href="admins.html" id="adminsLink" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300 hidden">Admins</a>
                <button id="logoutBtn" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300">Logout</button>
            </div>
        </div>

        <!-- Venue (geofence) -->
        <div class="bg-white p-4 rounded-lg shadow mb-6">
            <div class="flex flex-wrap items-end gap-3">
                <div>
                    <label class="block text-xs text-gray-600 mb-1">Geofence radius (m)</label>
                    <input id="radiusInput" type="number" min="10" value="100" class="w-28 p-2 border border-gray-300 rounded">
                </div>
                <button id="setVenueBtn" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">📍 Use my current location as venue</button>
                <span id="venueStatus" class="text-sm text-gray-500">Venue: loading…</span>
            </div>
            <p class="text-xs text-gray-400 mt-2">Set this at the meeting venue. Submissions are only accepted within the radius of this point.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- QR -->
            <div class="bg-white p-6 rounded-lg shadow text-center">
                <h2 class="text-lg font-semibold mb-4">Scan to fill the form</h2>
                <div class="flex justify-center mb-4">
                    <div class="relative">
                        <img id="qr-image" src="" alt="QR Code" class="w-64 h-64 border-4 border-blue-500 rounded-lg hidden">
                        <div id="qr-loading" class="absolute inset-0 flex items-center justify-center hidden">
                            <div class="spinner rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500"></div>
                        </div>
                    </div>
                </div>
                <div id="error-message" class="text-red-500 mb-2 min-h-5 text-sm"></div>
                <div id="session-info" class="text-xs text-gray-500 mb-3 hidden">Expires in: <span id="expiry-time"></span></div>
                <button id="generate-btn" class="bg-blue-600 text-white py-2 px-6 rounded hover:bg-blue-700">Refresh QR</button>
            </div>

            <!-- List -->
            <div class="bg-white p-6 rounded-lg shadow">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-semibold">Submitted <span id="count" class="text-sm font-normal text-gray-500"></span></h2>
                    <div class="flex gap-2">
                        <button id="downloadBtn" class="bg-green-600 text-white px-3 py-1.5 rounded text-sm hover:bg-green-700">Download Excel</button>
                        <button id="refreshBtn" class="bg-blue-600 text-white px-3 py-1.5 rounded text-sm hover:bg-blue-700">Refresh</button>
                    </div>
                </div>
                <div class="overflow-x-auto max-h-[28rem] overflow-y-auto">
                    <table class="min-w-full border border-gray-300 text-sm">
                        <thead class="bg-gray-100 sticky top-0">
                            <tr>
                                <th class="px-3 py-2 border text-left">#</th>
                                <th class="px-3 py-2 border text-left">Full Name</th>
                                <th class="px-3 py-2 border text-left">Koperasi ID</th>
                            </tr>
                        </thead>
                        <tbody id="listBody" class="bg-white"></tbody>
                    </table>
                </div>
                <div class="mt-3 text-right">
                    <button id="clearBtn" class="text-red-500 text-xs hover:underline">Clear list (start fresh)</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ---- Admin guard ----
        const adminToken = localStorage.getItem('adminToken');
        if (!adminToken) window.location.href = 'login.html';
        const authHeader = { Authorization: `Bearer ${adminToken}` };

        function handleAuthError(status) {
            if (status === 401) {
                localStorage.removeItem('adminToken');
                window.location.href = 'login.html';
                return true;
            }
            return false;
        }

        // ---- QR generation (auto-refreshes before expiry) ----
        let expiryInterval = null;
        let autoRefreshTimerId = null;

        function updateExpiryTimer(expiresInMs) {
            clearInterval(expiryInterval);
            let remaining = expiresInMs;
            const tick = () => {
                if (remaining <= 0) { clearInterval(expiryInterval); document.getElementById('expiry-time').textContent = 'expired'; return; }
                const m = Math.floor(remaining / 60000), s = Math.floor((remaining % 60000) / 1000);
                document.getElementById('expiry-time').textContent = `${m}m ${s}s`;
            };
            tick();
            expiryInterval = setInterval(() => { remaining -= 1000; tick(); }, 1000);
        }

        async function generateQR() {
            const btn = document.getElementById('generate-btn');
            if (autoRefreshTimerId) { clearTimeout(autoRefreshTimerId); autoRefreshTimerId = null; }
            btn.disabled = true; btn.textContent = 'Generating…';
            document.getElementById('error-message').textContent = '';
            document.getElementById('qr-image').classList.add('hidden');
            document.getElementById('qr-loading').classList.remove('hidden');
            try {
                const res = await fetch('/api/generate-qr');
                const data = await res.json();
                if (data.status === 'success') {
                    const img = document.getElementById('qr-image');
                    img.onload = () => { img.classList.remove('hidden'); document.getElementById('qr-loading').classList.add('hidden'); };
                    img.src = `${data.qrImage}?t=${Date.now()}`;
                    document.getElementById('session-info').classList.remove('hidden');
                    updateExpiryTimer(data.expiresIn);
                    if (data.expiresIn > 10000) {
                        autoRefreshTimerId = setTimeout(generateQR, data.expiresIn - 10000);
                    }
                } else { throw new Error(data.message || 'Failed'); }
            } catch (e) {
                document.getElementById('error-message').textContent = 'Failed to generate QR code';
                document.getElementById('qr-loading').classList.add('hidden');
            } finally {
                btn.disabled = false; btn.textContent = 'Refresh QR';
            }
        }

        // ---- Show admin-only controls only for the 'admin' role ----
        async function applyRole() {
            try {
                const res = await fetch('/api/admin/me', { headers: authHeader });
                if (handleAuthError(res.status)) return;
                const { data } = await res.json();
                if (data && data.role === 'admin') {
                    document.getElementById('adminsLink').classList.remove('hidden');
                }
            } catch (e) {}
        }

        // ---- Venue (geofence) ----
        function setVenueStatus(d) {
            const el = document.getElementById('venueStatus');
            if (d && d.venueLat != null && d.venueLng != null) {
                el.textContent = `Venue set: ${Number(d.venueLat).toFixed(5)}, ${Number(d.venueLng).toFixed(5)} (±${d.radiusMeters}m)`;
                el.className = 'text-sm text-green-600';
            } else {
                el.textContent = 'No venue set — geofence OFF (anyone can submit)';
                el.className = 'text-sm text-orange-600';
            }
        }

        async function loadVenue() {
            try {
                const res = await fetch('/api/session/venue', { headers: authHeader });
                if (handleAuthError(res.status)) return;
                const { data } = await res.json();
                if (data.radiusMeters) document.getElementById('radiusInput').value = data.radiusMeters;
                setVenueStatus(data);
            } catch (e) {}
        }

        function captureVenue() {
            const el = document.getElementById('venueStatus');
            if (!navigator.geolocation) { el.textContent = 'Geolocation not supported'; return; }
            el.textContent = 'Getting location…';
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const body = {
                    venueLat: pos.coords.latitude,
                    venueLng: pos.coords.longitude,
                    radiusMeters: parseInt(document.getElementById('radiusInput').value) || 100
                };
                try {
                    const res = await fetch('/api/session/venue', {
                        method: 'POST',
                        headers: { ...authHeader, 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    if (handleAuthError(res.status)) return;
                    const { data } = await res.json();
                    setVenueStatus(data);
                } catch (e) { el.textContent = 'Failed to save venue'; el.className = 'text-sm text-red-600'; }
            }, (err) => { el.textContent = 'Location error: ' + err.message; el.className = 'text-sm text-red-600'; },
            { enableHighAccuracy: true, timeout: 10000 });
        }

        // ---- Live submitted list ----
        async function loadList() {
            try {
                const res = await fetch('/api/attendance/list', { headers: authHeader });
                if (handleAuthError(res.status)) return;
                const { data } = await res.json();
                document.getElementById('count').textContent = `(${data.length})`;
                const body = document.getElementById('listBody');
                if (!data.length) {
                    body.innerHTML = '<tr><td colspan="3" class="px-3 py-3 border text-center text-gray-500">No submissions yet.</td></tr>';
                    return;
                }
                body.innerHTML = data.map((r, i) => `
                    <tr>
                        <td class="px-3 py-2 border">${i + 1}</td>
                        <td class="px-3 py-2 border">${r.name || ''}</td>
                        <td class="px-3 py-2 border">${r.koperasiId || ''}</td>
                    </tr>`).join('');
            } catch (e) { /* ignore transient errors */ }
        }

        async function downloadExcel() {
            try {
                const res = await fetch('/api/attendance/export', { headers: authHeader });
                if (handleAuthError(res.status)) return;
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `attendance_${new Date().toISOString().split('T')[0]}.xlsx`;
                document.body.appendChild(a); a.click(); a.remove();
                URL.revokeObjectURL(url);
            } catch (e) { alert('Failed to download Excel'); }
        }

        async function clearList() {
            if (!confirm('Clear the entire list? This cannot be undone.')) return;
            const res = await fetch('/api/attendance/clear', { method: 'POST', headers: authHeader });
            if (handleAuthError(res.status)) return;
            await loadList();
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('generate-btn').addEventListener('click', generateQR);
            document.getElementById('setVenueBtn').addEventListener('click', captureVenue);
            document.getElementById('refreshBtn').addEventListener('click', loadList);
            document.getElementById('downloadBtn').addEventListener('click', downloadExcel);
            document.getElementById('clearBtn').addEventListener('click', clearList);
            document.getElementById('logoutBtn').addEventListener('click', async () => {
                try { await fetch('/api/admin/logout', { method: 'POST', headers: authHeader }); } catch (e) {}
                localStorage.removeItem('adminToken');
                window.location.href = 'login.html';
            });
            applyRole();
            loadVenue();
            generateQR();
            loadList();
            setInterval(loadList, 10000); // auto-refresh the list every 10s
        });
    </script>
</body>
</html>
