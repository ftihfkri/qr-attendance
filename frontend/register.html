<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
    .card { box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">
  <div class="card bg-white rounded-xl p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <i class="fas fa-user-plus text-5xl text-indigo-600 mb-4"></i>
      <h1 class="text-3xl font-bold text-gray-800">Register</h1>
      <p class="text-gray-500 mt-2">Create a staff account</p>
    </div>

    <form id="registerForm" class="space-y-5">
      <div>
        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" id="username" required autocomplete="off"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
          placeholder="Choose a username">
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="password" required autocomplete="new-password"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
          placeholder="At least 6 characters">
      </div>
      <div>
        <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
        <input type="password" id="confirmPassword" required autocomplete="new-password"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
          placeholder="Re-enter password">
      </div>

      <button type="submit" id="registerBtn"
        class="w-full bg-indigo-600 text-white py-3 px-4 rounded-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
        <i class="fas fa-user-plus mr-2"></i> Create account
      </button>

      <div id="message" class="text-sm text-center"></div>

      <p class="text-center text-sm text-gray-500">
        Already have an account? <a href="login.html" class="text-indigo-600 hover:underline">Log in</a>
      </p>
    </form>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const msg = document.getElementById('message');
      const btn = document.getElementById('registerBtn');

      if (password !== confirmPassword) {
        msg.textContent = 'Passwords do not match.';
        msg.className = 'text-sm text-center text-red-600';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Creating…';
      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, confirmPassword })
        });
        const data = await res.json();
        if (!res.ok) {
          msg.textContent = data.message || 'Registration failed.';
          msg.className = 'text-sm text-center text-red-600';
          return;
        }
        msg.textContent = 'Account created! Redirecting to login…';
        msg.className = 'text-sm text-center text-green-600';
        setTimeout(() => { window.location.href = 'login.html'; }, 1200);
      } catch (err) {
        msg.textContent = 'Something went wrong. Try again.';
        msg.className = 'text-sm text-center text-red-600';
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus mr-2"></i> Create account';
      }
    });
  </script>
</body>
</html>
